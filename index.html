            await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: MONAD_CHAIN_ID }] });
          } catch (switchError) {
            if (switchError.code === 4902) {
              try {
                await window.ethereum.request({ method: 'wallet_addEthereumChain', params: [{ chainId: MONAD_CHAIN_ID, chainName: 'Monad Mainnet', nativeCurrency: { name: 'MON', symbol: 'MON', decimals: 18 }, rpcUrls: [MONAD_RPC], blockExplorerUrls: ['https://explorer.monad.xyz'] }] });
              } catch (addError) { showStatus('❌ Failed to add Monad network'); return; }
            } else { showStatus('❌ Failed to switch network'); return; }
          }
        }
        contract = new web3.eth.Contract(CONTRACT_ABI, CONTRACT_ADDRESS);
        walletAddressSpan.textContent = userAddress.slice(0, 8) + '...' + userAddress.slice(-6);
        chainIdSpan.textContent = MONAD_CHAIN_ID_DECIMAL;
        connectBtn.style.display = 'none';
        connectedWallet.style.display = 'block';
        statusMessage.classList.add('hidden');
        updatePurchaseButton();
        window.ethereum.on('accountsChanged', (accounts) => {
          if (accounts.length === 0) { disconnectWallet(); }
          else { userAddress = accounts[0]; walletAddressSpan.textContent = userAddress.slice(0, 8) + '...' + userAddress.slice(-6); }
        });
        window.ethereum.on('chainChanged', () => { location.reload(); });
      } catch (error) {
        showStatus('❌ Failed to connect: ' + (error.message || 'Unknown error'));
      }
    });

    function disconnectWallet() {
      userAddress = null; web3 = null; contract = null;
      connectBtn.style.display = 'block';
      connectedWallet.style.display = 'none';
      voucherBtns.forEach(b => b.classList.remove('selected'));
      selectedVoucher = null;
      updatePurchaseButton();
      showStatus('Wallet disconnected.');
    }
    disconnectBtn.addEventListener('click', disconnectWallet);

    voucherBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        if (!userAddress) { showStatus('⚠️ Please connect wallet first'); return; }
        voucherBtns.forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedVoucher = { value: parseInt(btn.dataset.value), price: btn.dataset.price };
        updatePurchaseButton();
      });
    });

    function updatePurchaseButton() {
      if (selectedVoucher && userAddress) {
        purchaseBtn.disabled = false;
        purchaseBtn.textContent = `BUY ${selectedVoucher.value}€ FOR ${selectedVoucher.price} MON`;
      } else {
        purchaseBtn.disabled = true;
        purchaseBtn.textContent = 'SELECT VOUCHER';
      }
    }

    purchaseBtn.addEventListener('click', async () => {
      if (!selectedVoucher || !userAddress) return;
      showStatus('🔄 Preparing transaction...');
      try {
        const voucherId = `VOC-${Date.now()}-${Math.random().toString(36).substr(2, 9).toUpperCase()}`;
        showStatus('💳 Confirm transaction in MetaMask...');
        const tx = await contract.methods.purchaseVoucher(selectedVoucher.value, voucherId).send({
          from: userAddress,
          value: web3.utils.toWei(selectedVoucher.price, 'ether')
        });
        let tokenId = null;
        if (tx.events && tx.events.VoucherPurchased) {
          tokenId = tx.events.VoucherPurchased.returnValues.tokenId;
        } else {
          tokenId = tx.logs?.[0]?.topics?.[1] ? parseInt(tx.logs[0].topics[1], 16) : '?';
        }
        showStatus(`✅ Voucher #${tokenId} minted successfully! TX: ${tx.transactionHash.slice(0,10)}...`);
        voucherBtns.forEach(b => b.classList.remove('selected'));
        selectedVoucher = null;
        updatePurchaseButton();
      } catch (error) {
        if (error.code === 4001) { showStatus('❌ Transaction rejected by user'); }
        else { showStatus('❌ Transaction failed: ' + (error.message || 'Unknown error')); }
      }
    });

    readVoucherBtn.addEventListener('click', async () => {
      const tokenId = readTokenId.value;
      voucherResult.textContent = '';
      if (!tokenId || isNaN(tokenId)) { voucherResult.textContent = 'Please enter a valid tokenId.'; return; }
      if (!contract) { voucherResult.textContent = 'Please connect wallet first.'; return; }
      try {
        voucherResult.textContent = 'Loading...';
        const result = await contract.methods.getVoucher(tokenId).call();
        voucherResult.innerHTML = `
          <div class="space-y-1">
            <div><b>Euro Value:</b> ${result[0]}€</div>
            <div><b>Price Paid (MON):</b> ${web3.utils.fromWei(result[1], 'ether')} MON</div>
            <div><b>Buyer:</b> ${result[2]}</div>
            <div><b>Purchase Time:</b> ${new Date(Number(result[3]) * 1000).toLocaleString()}</div>
            <div><b>Redeemed:</b> ${result[4] ? 'Yes ✓' : 'No ✗'}</div>
            <div><b>Voucher ID:</b> ${result[5]}</div>
          </div>`;
      } catch (err) {
        voucherResult.textContent = 'Error: ' + (err.message || 'Token may not exist');
      }
    });

    function showStatus(message) {
      statusText.innerHTML = message;
      statusMessage.classList.remove('hidden');
    }
  </script>
</body>
</html>
